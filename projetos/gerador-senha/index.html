<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Senha</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="gerador">

<h1>Gerador de Senha</h1>

<label>Tamanho da senha</label>
<input type="number" id="tamanho" min="4" max="32" value="12">

<div class="opcoes">

<label><input type="checkbox" id="maiusculas" checked> Letras maiúsculas</label>

<label><input type="checkbox" id="numeros" checked> Números</label>

<label><input type="checkbox" id="simbolos"> Símbolos</label>

</div>

<button onclick="gerarSenha()">Gerar senha</button>

<input type="text" id="senha" readonly>

<button onclick="copiarSenha()">Copiar senha</button>

<div id="forca"></div>

</div>

<script src="script.js"></script>

</body>
</html>
